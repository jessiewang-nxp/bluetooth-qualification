<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//PWG//DTD XHTML-Print 1.0//EN"
		  "http://www.pwg.org/xhtml-print/xhtml-print10.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<title>Пример документа на русском языке</title>
	<style type="text/css">
	@media screen
	{
	.test {font-family: sans-serif; color:red}
	}

	@media print
	{
	.test {font-family:times,serif; color:blue}
	}

	@media screen,print
	{
	.test {font-weight:bold}
	}




	</style>
</head>

<body>
<h1>Привет, мир!</h1>
    <p>Это простой XHTML-документ на русском языке.</p>
    <p>Кириллические символы (такие как: **Ж, Ц, Ш, Щ, Э, Ю, Я**) не поддерживаются кодировкой ISO 8859-1.</p>
    <p>Мы используем **UTF-8** для их корректного отображения.</p>
</body>
</html>
